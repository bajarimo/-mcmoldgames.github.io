const {useState,useEffect,useRef,useCallback,createElement:h} = React;
const ROWS=5,COLS=6,WIN_SCORE=12;
const EMPTY=null,GOOSE="goose",CRACKED_L="cracked_l",CRACKED_R="cracked_r",P1="green",P2="red";
const puns=["Eggsellent!","Shell yeah!","Scrambled!","Over easy!","Sunny side up!","Crack-tastic!"];
const font="'Arial Rounded MT Bold',Arial,sans-serif";

function initBoard(){return Array(ROWS).fill(null).map(()=>Array(COLS).fill(EMPTY));}
function isBlocked(cell){return cell===GOOSE||cell===CRACKED_L||cell===CRACKED_R;}

function getLines(board,r,c){
  const dirs=[[0,1],[1,0],[1,1],[1,-1]];
  const color=board[r][c];
  if(!color||isBlocked(color))return[];
  const found=[];
  for(const [dr,dc] of dirs){
    const all=[];
    let nr=r-dr*4,nc=c-dc*4;
    for(let i=0;i<9;i++){
      if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS) all.push([nr,nc,board[nr][nc]]);
      nr+=dr;nc+=dc;
    }
    let run=[];
    for(const [rr,cc,v] of all){
      if(v===color) run.push([rr,cc]);
      else run=[];
      if(run.some(([a,b])=>a===r&&b===c)&&run.length>=3) found.push([...run]);
    }
  }
  // deduplicate by length+positions
  const seen=new Set();
  return found.filter(line=>{const k=line.map(p=>p.join(",")).sort().join("|");if(seen.has(k))return false;seen.add(k);return true;});
}

function scoreForLength(n){return n===3?1:n===4?2:n>=5?3:0;}

function countInDir(board,r,c,dr,dc,color){
  let count=0;
  for(const s of[-1,1]){let nr=r+dr*s,nc=c+dc*s;while(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&board[nr][nc]===color){count++;nr+=dr*s;nc+=dc*s;}}
  return count;
}

function aiScoreMove(board,r,c){
  const dirs=[[0,1],[1,0],[1,1],[1,-1]];
  const b=board.map(x=>[...x]);b[r][c]=P2;
  const lines=getLines(b,r,c);
  if(lines.length){
    const pts=lines.reduce((s,l)=>s+scoreForLength(l.length),0)+(lines.length>1?lines.length-1:0);
    const maxLen=Math.max(...lines.map(l=>l.length));
    return 10000+pts*500+(lines.length>1?1000:0)+maxLen*200;
  }
  let score=0;
  for(const [dr,dc] of dirs){
    const count=countInDir(b,r,c,dr,dc,P2);const totalRun=count+1;
    let openSpace=0;
    for(const s of[-1,1]){let nr=r+dr*s,nc=c+dc*s;while(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!isBlocked(b[nr][nc])){openSpace++;nr+=dr*s;nc+=dc*s;}}
    if(totalRun>=4)score+=4000;else if(totalRun===3&&openSpace>=3)score+=2000;else if(totalRun===2&&openSpace>=4)score+=800;
    if(openSpace>=4)score+=300;
  }
  let partialLines=0;
  for(const [dr,dc] of dirs){if(countInDir(b,r,c,dr,dc,P2)+1>=2)partialLines++;}
  if(partialLines>=2)score+=1500;
  const pb=board.map(x=>[...x]);pb[r][c]=P1;
  for(const [dr,dc] of dirs){const pCount=countInDir(pb,r,c,dr,dc,P1);if(pCount+1>=4)score+=3500;else if(pCount+1>=3)score+=1200;}
  score+=Math.max(0,200-(Math.abs(r-2)+Math.abs(c-2.5))*40);
  return score;
}

function aiPlaceGoose(board){
  const empty=[];for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(!board[r][c])empty.push([r,c]);
  if(!empty.length)return null;
  let best=null,bestScore=-Infinity;
  for(const [r,c] of empty){const s=-(Math.abs(r-2)+Math.abs(c-2.5))+(Math.random()*0.5);if(s>bestScore){bestScore=s;best=[r,c];}}
  return best;
}
function aiMoveEasy(board){
  const empty=[];for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(!board[r][c]&&!isBlocked(board[r][c]))empty.push([r,c]);
  return empty.length?empty[Math.floor(Math.random()*empty.length)]:null;
}
function aiMoveHard(board){
  const empty=[];for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(!board[r][c]&&!isBlocked(board[r][c]))empty.push([r,c]);
  if(!empty.length)return null;
  let best=null,bestScore=-Infinity;
  for(const [r,c] of empty){const s=aiScoreMove(board,r,c);if(s>bestScore){bestScore=s;best=[r,c];}}
  return best;
}

    // shell highlight

function ChickenAnimOverlay({onDone,targetRef}){
  const [xPct,setXPct]=useState(-15);
  const [phase,setPhase]=useState("walk");
  const [bounce,setBounce]=useState(0);
  const rafRef=useRef();const startRef=useRef(null);const targetX=useRef(30);
  useEffect(()=>{
    if(targetRef?.current){const rect=targetRef.current.getBoundingClientRect();targetX.current=((rect.left+rect.width/2)/window.innerWidth)*100-8;}
    const animate=ts=>{
      if(!startRef.current)startRef.current=ts;
      const el=ts-startRef.current;
      if(phase==="walk"){const nx=Math.min(-15+el*0.045,targetX.current);setXPct(nx);setBounce(Math.sin(el*0.015)*5);if(nx>=targetX.current){setPhase("lay");startRef.current=null;}else rafRef.current=requestAnimationFrame(animate);}
      else{setBounce(Math.sin(el*0.03)*3);if(el>1200)onDone();else rafRef.current=requestAnimationFrame(animate);}
    };
    rafRef.current=requestAnimationFrame(animate);
    return()=>cancelAnimationFrame(rafRef.current);
  },[phase]);
  return h('div',{style:{position:"fixed",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:1000}},
    h('div',{style:{position:"absolute",bottom:"30%",left:`${xPct}%`,transform:`translateY(${bounce}px)`,transition:"left 0.05s linear"}},
      h(ChickenSVG,{laying:phase==="lay"}),
      phase==="lay"&&h('div',{style:{position:"absolute",top:-30,left:10,background:"#f39c12",color:"#fff",padding:"4px 10px",borderRadius:20,fontFamily:font,fontWeight:900,fontSize:14,whiteSpace:"nowrap"}},"CRACK!")
    )
  );
}

      h('div',{style:{fontSize:56,marginBottom:8}},"🐔"),

      h('div',{style:{display:"flex",gap:8,marginBottom:16,background:"rgba(0,0,0,0.3)",borderRadius:12,padding:6}},

      ),
      h('button',{onClick:()=>onSelect("ai",difficulty),style:{width:"100%",marginBottom:14,padding:"16px",background:"linear-gradient(135deg,#e67e22,#d35400)",color:"#fff",border:"none",borderRadius:16,fontSize:18,fontWeight:900,cursor:"pointer",fontFamily:font,display:"flex",alignItems:"center",justifyContent:"center",gap:10}},
        h('span',null,"🤖"),
        h('div',{style:{textAlign:"left"}},
          h('div',null,`vs AI (${difficulty==="easy"?"Easy":"Hard"})`),
          h('div',{style:{fontSize:11,fontWeight:400,opacity:0.8}},difficulty==="easy"?"Random moves — great for beginners":"Strategic AI — a real challenge")
        )
      ),
      h('button',{onClick:()=>onSelect("2p","none"),style:{width:"100%",marginBottom:20,padding:"16px",background:"linear-gradient(135deg,#27ae60,#1e8449)",color:"#fff",border:"none",borderRadius:16,fontSize:18,fontWeight:900,cursor:"pointer",fontFamily:font,display:"flex",alignItems:"center",justifyContent:"center",gap:10}},
        h('span',null,"👥"),
        h('div',{style:{textAlign:"left"}},
          h('div',null,"2 Players"),
          h('div',{style:{fontSize:11,fontWeight:400,opacity:0.8}},"Take turns on the same device")
        )
      ),
      h('a',{href:"/chicken-checkers-rules/",style:{display:"block",color:"#f39c12",fontFamily:font,fontSize:14,textDecoration:"none"}},"📖 View Full Rulebook")
    )
  );
}

function ChickenCheckers(){
  const [mode,setMode]=useState(null);
  const [difficulty,setDifficulty]=useState("hard");
  const [board,setBoard]=useState(initBoard());
  const [phase,setPhase]=useState("setup");
  const [gooseCount,setGooseCount]=useState(0);
  const [turn,setTurn]=useState(P1);
  const [scores,setScores]=useState({[P1]:0,[P2]:0});
  const [msg,setMsg]=useState("");
  const [highlight,setHighlight]=useState([]);
  const [chickenAnim,setChickenAnim]=useState(null);
  const [lastPun,setLastPun]=useState("");
  const [pendingCrackBoard,setPendingCrackBoard]=useState(null);
  const [pendingCrackScores,setPendingCrackScores]=useState(null);
  const [animating,setAnimating]=useState(false);
  const [debugLog,setDebugLog]=useState([]);
  const [cracksLeft,setCracksLeft]=useState(0);
  const [crackStep,setCrackStep]=useState(null);
  const [crackScoredLine,setCrackScoredLine]=useState([]);
  const [crackValidCells,setCrackValidCells]=useState([]);
  const [crackNextTurn,setCrackNextTurn]=useState(null);
  const [crackHalf1Pos,setCrackHalf1Pos]=useState(null);
  const cellRefs=useRef({});

  const p1Label=mode==="2p"?"Player 1":"You";
  const p2Label=mode==="2p"?"Player 2":"AI";

  const getAdjacent=useCallback((b,r,c)=>{
    return[[r-1,c],[r+1,c],[r,c-1],[r,c+1]].filter(([nr,nc])=>nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!b[nr][nc]);
  },[]);

  const endTurn=useCallback((b,sc,next)=>{
    const empty=[];for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(!b[r][c])empty.push([r,c]);
    if(sc[P1]>=WIN_SCORE){setMsg(`🏆 ${p1Label} wins! Eggsellent!`);setPhase("gameOver");return;}
    if(sc[P2]>=WIN_SCORE){setMsg(`🏆 ${p2Label} wins! Eggsellent!`);setPhase("gameOver");return;}
    if(!empty.length){const w=sc[P1]>sc[P2]?`🏆 ${p1Label} wins!`:sc[P2]>sc[P1]?`🏆 ${p2Label} wins!`:"🤝 Tie!";setMsg(w+" Board full!");setPhase("gameOver");return;}
    if(next===P2){setTurn(P2);setMsg(mode==="2p"?`${p2Label}'s turn (Red) — click a cell!`:"AI is thinking...");}
    else{setTurn(P1);setMsg(mode==="2p"?`${p1Label}'s turn (Green) — click a cell!`:"Your turn — click a cell!");}
  },[mode,p1Label,p2Label]);

  const applyScore=useCallback((b,r,c,color,sc)=>{
    if(b[r][c]!==color)return null;
    const lines=getLines(b,r,c);
    if(!lines.length)return null;
    let pts=0;const scored=new Set();
    for(const line of lines){pts+=scoreForLength(line.length);for(const [lr,lc] of line)scored.add(`${lr},${lc}`);}
    if(lines.length>1)pts+=lines.length-1;
    const nb=b.map(row=>[...row]);
    for(const k of scored){const [lr,lc]=k.split(",").map(Number);nb[lr][lc]=EMPTY;}
    const ns={...sc,[color]:sc[color]+pts};
    const maxLine=Math.max(...lines.map(l=>l.length));
    const cracks=maxLine===4?1:maxLine>=5?2:0;
    setDebugLog(prev=>[`[${color}] (${r},${c}) | lines:[${lines.map(l=>l.length).join(",")}] | pts:${pts} | cracks:${cracks}`,...prev].slice(0,6));
    return{newBoard:nb,newScores:ns,pts,cracks,pun:puns[Math.floor(Math.random()*puns.length)],scored:[...scored]};
  },[]);

  const startCrackSequence=useCallback((b,sc,cracksRemaining,scoredCells,nextTurn)=>{
    const validFirst=scoredCells.filter(([r,c])=>!b[r][c]);
    setPendingCrackBoard(b);setPendingCrackScores(sc);setCrackScoredLine(scoredCells);
    setCracksLeft(cracksRemaining);setCrackStep("half1");setCrackValidCells(validFirst);
    setCrackNextTurn(nextTurn);setCrackHalf1Pos(null);setPhase("crackPick");
    setMsg(`🥚 Crack! Pick a cell from the scored line for the LEFT half (${cracksRemaining} egg${cracksRemaining>1?"s":""} left)`);
  },[]);

  useEffect(()=>{
    if(mode!=="ai"||phase!=="play"||turn!==P2||animating)return;
    const t=setTimeout(()=>{
      const pos=difficulty==="easy"?aiMoveEasy(board):aiMoveHard(board);
      if(!pos){endTurn(board,scores,P1);return;}
      const [r,c]=pos;const nb=board.map(x=>[...x]);nb[r][c]=P2;
      const res=applyScore(nb,r,c,P2,scores);
      if(res){
        setAnimating(true);setBoard(nb);setHighlight(res.scored);setLastPun(res.pun);
        setTimeout(()=>{
          setBoard(res.newBoard);setScores(res.newScores);setHighlight([]);
          if(res.cracks>0){
            let cb=res.newBoard.map(x=>[...x]);
            const scoredCells=res.scored.map(k=>k.split(",").map(Number));
            for(let i=0;i<res.cracks;i++){
              const vf=scoredCells.filter(([sr,sc])=>!cb[sr][sc]);if(!vf.length)break;
              const [fr,fc]=vf[Math.floor(Math.random()*vf.length)];cb[fr][fc]=CRACKED_L;
              const adj=[[fr-1,fc],[fr+1,fc],[fr,fc-1],[fr,fc+1]].filter(([nr,nc])=>nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!cb[nr][nc]);
              if(adj.length){const [ar,ac]=adj[Math.floor(Math.random()*adj.length)];cb[ar][ac]=CRACKED_R;}
            }
            setTimeout(()=>{setAnimating(false);setBoard(cb);endTurn(cb,res.newScores,P1);},700);
          } else{setAnimating(false);endTurn(res.newBoard,res.newScores,P1);}
        },800);
      } else{setBoard(nb);endTurn(nb,scores,P1);}
    },700);
    return()=>clearTimeout(t);
  },[mode,difficulty,phase,turn,board,scores,animating]);

  const handleChickenDone=()=>{
    const {r,c}=chickenAnim;const b=pendingCrackBoard;setChickenAnim(null);
    if(crackStep==="half1"){
      const nb=b.map(x=>[...x]);nb[r][c]=CRACKED_L;
      setPendingCrackBoard(nb);setCrackHalf1Pos({r,c});
      setCrackValidCells(getAdjacent(nb,r,c));setCrackStep("half2");
      setMsg("🥚 Now pick an adjacent empty cell for the RIGHT half!");
    } else if(crackStep==="half2"){
      const nb=b.map(x=>[...x]);nb[r][c]=CRACKED_R;const left=cracksLeft-1;
      setPendingCrackBoard(nb);
      if(left>0){
        const vf=crackScoredLine.filter(([sr,sc])=>!nb[sr][sc]);
        setCracksLeft(left);setCrackStep("half1");setCrackHalf1Pos(null);setCrackValidCells(vf);
        setMsg("🥚 Crack egg 2! Pick a cell from the scored line for the LEFT half");
      } else{
        const sc=pendingCrackScores;const next=crackNextTurn;
        setCrackStep(null);setCrackScoredLine([]);setCrackValidCells([]);setCracksLeft(0);
        setCrackHalf1Pos(null);setPendingCrackBoard(null);setPendingCrackScores(null);setCrackNextTurn(null);
        setBoard(nb);setPhase("play");endTurn(nb,sc,next);
      }
    }
  };

  const handleCellClick=(r,c)=>{
    if(mode==="ai"&&turn===P2&&phase==="play")return;
    if(phase==="setup"){
      if(board[r][c])return;
      const nb=board.map(x=>[...x]);nb[r][c]=GOOSE;const ng=gooseCount+1;setGooseCount(ng);
      if(ng>=4){setBoard(nb);setPhase("play");setTurn(P1);setMsg(mode==="2p"?`${p1Label}'s turn (Green) — click a cell!`:"Your turn — click a cell!");return;}
      if(mode==="2p"){setBoard(nb);setMsg(ng%2===1?`${p2Label}: place your goose egg (Red)`:`${p1Label}: place your goose egg (Green)`);}
      else{
        const ap=aiPlaceGoose(nb);
        if(ap){nb[ap[0]][ap[1]]=GOOSE;const ng2=ng+1;setGooseCount(ng2);setBoard(nb);
          if(ng2>=4){setPhase("play");setTurn(P1);setMsg("Your turn — click a cell!");}else setMsg("Place your 2nd goose egg");}
        else setBoard(nb);
      }
      return;
    }
    if(phase==="crackPick"){
      const b=pendingCrackBoard||board;
      if(!crackValidCells.some(([vr,vc])=>vr===r&&vc===c)||b[r][c])return;
      setChickenAnim({r,c,key:`${r},${c}`});return;
    }
    if(phase!=="play"||board[r][c])return;
    const currentColor=turn;const nb=board.map(x=>[...x]);nb[r][c]=currentColor;
    const res=applyScore(nb,r,c,currentColor,scores);
    if(res){
      setHighlight(res.scored);setLastPun(res.pun);setTurn(null);setAnimating(true);setBoard(nb);
      setTimeout(()=>{
        setBoard(res.newBoard);setScores(res.newScores);setHighlight([]);setAnimating(false);
        const next=currentColor===P1?P2:P1;
        if(res.cracks>0){startCrackSequence(res.newBoard,res.newScores,res.cracks,res.scored.map(k=>k.split(",").map(Number)),next);}
        else endTurn(res.newBoard,res.newScores,next);
      },700);
    } else{const next=currentColor===P1?P2:P1;setBoard(nb);endTurn(nb,scores,next);}
  };

  const startGame=(selMode,selDiff)=>{
    setMode(selMode);setDifficulty(selDiff);setBoard(initBoard());setPhase("setup");setGooseCount(0);
    setTurn(P1);setScores({[P1]:0,[P2]:0});setMsg(selMode==="2p"?"Player 1: place your first goose egg!":"Place your first goose egg!");
    setHighlight([]);setChickenAnim(null);setLastPun("");setPendingCrackBoard(null);setPendingCrackScores(null);
    setAnimating(false);setDebugLog([]);setCracksLeft(0);setCrackStep(null);setCrackScoredLine([]);
    setCrackValidCells([]);setCrackNextTurn(null);setCrackHalf1Pos(null);
  };

  const renderCell=(r,c)=>{
    const key=`${r},${c}`;const isHL=highlight.includes(key);
    const displayBoard=phase==="crackPick"&&pendingCrackBoard?pendingCrackBoard:board;
    const cell=displayBoard[r][c];
    const isValidCrack=phase==="crackPick"&&crackValidCells.some(([vr,vc])=>vr===r&&vc===c)&&!cell;
    const isHalf1Placed=crackHalf1Pos&&crackHalf1Pos.r===r&&crackHalf1Pos.c===c;
    const isMyTurn=(phase==="play"&&turn!==null&&!(mode==="ai"&&turn===P2))||(phase==="setup");
    const clickable=(!cell&&isMyTurn)||isValidCrack;
    return h('div',{key,ref:el=>cellRefs.current[key]=el,onClick:()=>handleCellClick(r,c),
      style:{display:"flex",alignItems:"center",justifyContent:"center",cursor:clickable?"pointer":"default",
        transform:isHL?"scale(1.2)":isValidCrack?"scale(1.08)":"scale(1.0)",transition:"transform 0.18s",
        filter:isHL?"brightness(1.4) drop-shadow(0 0 8px #f39c12)":isValidCrack?"drop-shadow(0 0 8px #e67e22)":isHalf1Placed?"drop-shadow(0 0 6px #27ae60)":"none",
        outline:isValidCrack?"2px dashed #e67e22":"none",borderRadius:4,padding:2},
      onMouseEnter:e=>{if(clickable&&!cell)e.currentTarget.style.transform="scale(1.12)";},
      onMouseLeave:e=>{e.currentTarget.style.transform=isValidCrack?"scale(1.08)":"scale(1.0)";}},
      cell===P1&&h(GreenEgg,{size:44}),
      cell===P2&&h(RedEgg,{size:44}),
      cell===GOOSE&&h(GooseEgg,{size:44}),
      cell===CRACKED_L&&h(CrackedLeft,{size:44}),
      cell===CRACKED_R&&h(CrackedRight,{size:44}),
      !cell&&h(EmptyCell,{size:44,clickable,highlight:isValidCrack})
    );
  };

  if(!mode)return h(ModeSelect,{onSelect:startGame});

  const modeLabel=mode==="2p"?"👥 2 Player":difficulty==="easy"?"🐣 vs AI (Easy)":"💀 vs AI (Hard)";

  return h('div',{style:{minHeight:"100vh",background:"linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}},
    h('div',{style:{background:"rgba(255,255,255,0.05)",backdropFilter:"blur(10px)",borderRadius:24,padding:20,maxWidth:420,width:"100%",border:"1px solid rgba(255,255,255,0.1)"}},
      h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
        h('h1',{style:{fontFamily:font,fontSize:18,color:"#f39c12"}},"🐔 CHICKEN CHECKERS"),
        h('span',{style:{color:"#636e72",fontSize:11,background:"rgba(0,0,0,0.3)",padding:"3px 8px",borderRadius:20}},modeLabel)
      ),
      h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,gap:8}},
        h('div',{style:{flex:1,background:"rgba(39,174,96,0.2)",border:"2px solid #27ae60",borderRadius:12,padding:"8px 12px",textAlign:"center"}},
          h('div',{style:{color:"#27ae60",fontSize:11,fontFamily:font,marginBottom:2}},`${p1Label} (Green)`),
          h('div',{style:{color:"#fff",fontSize:28,fontFamily:font,lineHeight:1}},scores[P1])
        ),
        h('div',{style:{textAlign:"center",color:"#636e72",fontSize:10,fontFamily:font}},"First to ",h('span',{style:{color:"#f39c12",fontSize:18}},WIN_SCORE)," wins!"),
        h('div',{style:{flex:1,background:"rgba(231,76,60,0.2)",border:"2px solid #e74c3c",borderRadius:12,padding:"8px 12px",textAlign:"center"}},
          h('div',{style:{color:"#e74c3c",fontSize:11,fontFamily:font,marginBottom:2}},`${p2Label} (Red)`),
          h('div',{style:{color:"#fff",fontSize:28,fontFamily:font,lineHeight:1}},scores[P2])
        )
      ),
      h('div',{style:{background:"rgba(0,0,0,0.3)",borderRadius:12,padding:"8px 12px",marginBottom:12,minHeight:36,display:"flex",alignItems:"center",justifyContent:"center",gap:8}},
        h('span',{style:{color:"#dfe6e9",fontSize:13,fontFamily:font,textAlign:"center"}},msg),
        lastPun&&h('span',{style:{color:"#f39c12",fontSize:12,fontFamily:font}},lastPun)
      ),
      h('div',{style:{display:"grid",gridTemplateColumns:`repeat(${COLS},1fr)`,gap:4,marginBottom:12,background:"rgba(0,0,0,0.2)",borderRadius:16,padding:8}},
        Array.from({length:ROWS},(_,r)=>Array.from({length:COLS},(_,c)=>renderCell(r,c)))
      ),
      h('div',{style:{display:"flex",justifyContent:"center",gap:16,marginBottom:8,flexWrap:"wrap"}},
        [[h(GreenEgg,{size:20}),p1Label],[h(RedEgg,{size:20}),p2Label],[h(GooseEgg,{size:20}),"Goose"],
         [h('div',{style:{display:"flex"}},h(CrackedLeft,{size:20}),h(CrackedRight,{size:20})),"Cracked"]
        ].map(([icon,label],i)=>h('div',{key:i,style:{display:"flex",alignItems:"center",gap:4}},icon,h('span',{style:{color:"#b2bec3",fontSize:10,fontFamily:font}},label)))
      ),
      h('div',{style:{display:"flex",justifyContent:"center",gap:8,flexWrap:"wrap",marginBottom:8}},
        ["3-row = 1pt","4-row = 2pts + crack","5-row = 3pts + 2 cracks","Combo = bonus pt!"].map((t,i)=>
          h('span',{key:i,style:{color:"#74b9ff",fontSize:10,background:"rgba(116,185,255,0.1)",padding:"2px 8px",borderRadius:20,fontFamily:font}},t)
        )
      ),
      debugLog.length>0&&h('div',{style:{background:"rgba(0,0,0,0.4)",borderRadius:8,padding:"6px 10px",marginBottom:8,fontSize:9,fontFamily:"monospace",color:"#55efc4",maxHeight:80,overflowY:"auto"}},
        h('div',{style:{color:"#fd79a8",fontWeight:"bold",marginBottom:2}},"🔍 Score Debug:"),
        debugLog.map((l,i)=>h('div',{key:i},l))
      ),
      h('div',{style:{textAlign:"center",marginBottom:10}},
        h('a',{href:"/chicken-checkers-rules/",style:{color:"#f39c12",fontFamily:font,fontSize:13,textDecoration:"none"}},"📖 View Full Rulebook")
      ),
      phase==="gameOver"
        ?h('div',{style:{display:"flex",gap:8}},
            h('button',{onClick:()=>startGame(mode,difficulty),style:{flex:1,padding:14,background:"linear-gradient(135deg,#e67e22,#d35400)",color:"#fff",border:"none",borderRadius:16,fontSize:18,fontWeight:900,cursor:"pointer",fontFamily:font}},"🥚 Play Again!"),
            h('button',{onClick:()=>setMode(null),style:{flex:1,padding:14,background:"linear-gradient(135deg,#6c5ce7,#a29bfe)",color:"#fff",border:"none",borderRadius:16,fontSize:18,fontWeight:900,cursor:"pointer",fontFamily:font}},"🐔 Menu")
          )
        :h('div',{style:{display:"flex",gap:8}},
            h('button',{onClick:()=>startGame(mode,difficulty),style:{flex:1,padding:9,background:"#2d3436",color:"#fff",border:"none",borderRadius:12,fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:font}},"🔄 Restart"),
            h('button',{onClick:()=>setMode(null),style:{flex:1,padding:9,background:"#2d3436",color:"#fff",border:"none",borderRadius:12,fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:font}},"🐔 Menu")
          )
    ),
    chickenAnim&&h(ChickenAnimOverlay,{onDone:handleChickenDone,targetRef:{current:cellRefs.current[chickenAnim.key]}})
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(ChickenCheckers));
</script>
</body>
</html>
